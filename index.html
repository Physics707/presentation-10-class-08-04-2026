<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Фотопрезентация JPG 1–6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-main: #020617;
      --bg-card: #0f172a;
      --accent: #38bdf8;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(148,163,184,0.35);
      --shadow: 0 0 22px rgba(56,189,248,0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      font-family: system-ui, Arial, sans-serif;
      overflow-y: scroll;
      scroll-behavior: smooth;
    }

    header {
      position: sticky;
      top: 0;
      width: 100%;
      background: rgba(2,6,23,0.9);
      backdrop-filter: blur(12px);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      z-index: 20;
    }

    .slides {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px 10px 40px;
    }

    .slide {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 14px;
      box-shadow: 0 10px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.06em;
    }

    .img-box {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(30,64,175,0.6);
      box-shadow: var(--shadow);
    }

    .img-box img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .footer {
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
    }

    /* адаптивность */
    @media (max-width: 480px) {
      header {
        font-size: 13px;
        padding: 8px 12px;
      }
      .card {
        border-radius: 12px;
        padding: 10px;
      }
      .img-box {
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>

<header>
  Фотопрезентация · 1–6 JPG
</header>

<main class="slides">

  <!-- Автоматически генерируем слайды прямо тут через JS -->
</main>

<script>
  const images = [
    "1.JPG","2.JPG","3.JPG","4.JPG","5.JPG","6.JPG"
  ];

  const slidesContainer = document.querySelector(".slides");

  images.forEach((file, index) => {
    const slide = document.createElement("section");
    slide.className = "slide";

    slide.innerHTML = `
      <div class="card">
        <div class="title">
          <span>Слайд</span>
          <span>#${index + 1}</span>
        </div>

        <div class="img-box">
          <img src="${file}" alt="Слайд ${index + 1}">
        </div>

        <div class="footer">${file}</div>
      </div>
    `;

    slidesContainer.appendChild(slide);
  });
</script>

</body>
</html>
